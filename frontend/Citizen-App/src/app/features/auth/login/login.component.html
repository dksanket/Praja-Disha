<div class="min-h-screen flex flex-col items-center justify-center p-4">
  <!-- Brand Header -->
  <header class="fixed top-0 w-full flex justify-center py-10 pointer-events-none">
    <div class="flex items-center gap-2">
      <img src="assets/logo/logo.png" [alt]="strings.brandName" class="h-8 w-auto object-contain" />
      <h1 class="font-headline-md text-2xl font-bold text-primary tracking-tight">{{ strings.brandName }}</h1>
    </div>
  </header>

  <main class="w-full max-w-md mt-16 z-10">
    <!-- Auth Card -->
    <div class="glass-card rounded-2xl p-6 shadow-sm animate-in fade-in zoom-in duration-500 bg-white/95">
      <div class="text-center mb-8">
        <h2 class="font-headline-lg text-2xl font-bold text-on-surface mb-2">{{ strings.welcomeTitle }}</h2>
        <p class="font-body-md text-sm text-secondary">{{ strings.welcomeSubtitle }}</p>
      </div>

      <form class="space-y-6" (submit)="onSubmit($event)">
        <!-- Input Field -->
        <div class="space-y-2">
          <label class="font-label-lg text-sm font-semibold text-on-surface-variant block" for="identifier">
            {{ strings.inputLabel }}
          </label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
              <span class="material-symbols-outlined">phone</span>
            </div>
            <input 
              class="w-full h-12 pl-10 pr-3 bg-surface-container-lowest border border-outline-variant rounded-xl font-body-md text-sm text-on-surface focus:ring-2 focus:ring-primary focus:border-primary transition-all placeholder:text-outline-variant/60" 
              id="identifier" 
              name="identifier" 
              [placeholder]="strings.inputPlaceholder" 
              required 
              type="text"
              [(ngModel)]="identifier">
          </div>
        </div>

        <!-- OTP Input Field -->
        <div class="space-y-2">
          <label class="font-label-lg text-sm font-semibold text-on-surface-variant block" for="otp">
            {{ strings.otpLabel }}
          </label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
              <span class="material-symbols-outlined">lock</span>
            </div>
            <input 
              class="w-full h-12 pl-10 pr-3 bg-surface-container-lowest border border-outline-variant rounded-xl font-body-md text-sm text-on-surface focus:ring-2 focus:ring-primary focus:border-primary transition-all placeholder:text-outline-variant/60" 
              id="otp" 
              name="otp" 
              [placeholder]="strings.otpPlaceholder" 
              required 
              type="text"
              [(ngModel)]="otp">
          </div>
        </div>

        <!-- Primary Action -->
        <button 
          class="w-full h-12 bg-primary text-on-primary font-label-lg text-sm font-semibold rounded-xl shadow-sm hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-1.5"
          [disabled]="isSending"
          [class.opacity-80]="isSending"
          [class.cursor-not-allowed]="isSending"
          type="submit">
          
          <ng-container *ngIf="!isSending">
            {{ strings.buttonLabel }}
            <span class="material-symbols-outlined text-lg">arrow_forward</span>
          </ng-container>

          <ng-container *ngIf="isSending">
            <span class="animate-spin material-symbols-outlined text-lg">progress_activity</span>
            {{ strings.sendingLabel }}
          </ng-container>
        </button>
      </form>

      <!-- Terms & Language Footer -->
      <div class="mt-8 pt-6 border-t border-outline-variant/50 text-center space-y-6">
        <p class="font-label-md text-xs text-secondary">
          {{ strings.termsAgreement }}
          <a class="text-primary hover:underline font-semibold" href="#">{{ strings.termsLink }}</a> 
          and 
          <a class="text-primary hover:underline font-semibold" href="#">{{ strings.privacyLink }}</a>.
        </p>

        <!-- Language Select -->
        <div class="flex flex-col items-center gap-1.5">
          <label for="language-select" class="font-label-md text-xs font-semibold text-secondary">{{ strings.languageLabel }}</label>
          <div class="relative w-full max-w-[200px]">
            <select 
              id="language-select" 
              class="w-full h-10 pl-3 pr-10 bg-surface-container-lowest border border-outline-variant rounded-xl font-body-md text-sm text-on-surface focus:ring-2 focus:ring-primary focus:border-primary transition-all appearance-none cursor-pointer"
              [value]="selectedLanguage"
              (change)="onLanguageChange($event)">
              <option *ngFor="let lang of languages" [value]="lang.code">{{ lang.label }}</option>
            </select>
            <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-primary">
              <span class="material-symbols-outlined text-lg">expand_more</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Secondary Support Options -->
    <div class="mt-6 text-center">
      <button class="font-label-lg text-sm text-secondary hover:text-primary transition-colors flex items-center justify-center gap-1 mx-auto py-2">
        <span class="material-symbols-outlined text-lg">help</span>
        {{ strings.helpLink }}
      </button>
    </div>
  </main>

  <!-- Background Decoration Elements -->
  <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none opacity-30">
    <div class="absolute top-[10%] left-[5%] w-64 h-64 bg-primary-container/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-[10%] right-[5%] w-96 h-96 bg-secondary-container/20 rounded-full blur-3xl"></div>
    <div class="absolute top-1/4 right-1/4 opacity-5">
      <span class="material-symbols-outlined text-[120px]">grid_view</span>
    </div>
    <div class="absolute bottom-1/4 left-1/4 opacity-5 rotate-12">
      <span class="material-symbols-outlined text-[80px]">corporate_fare</span>
    </div>
  </div>
</div>
