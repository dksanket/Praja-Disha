# =====================================================================
#  Praja Disha AI — Backend configuration
#  Edit the values below and run:  mvn spring-boot:run
# =====================================================================

spring.application.name=praja-disha-backend

# ---------------------------------------------------------------------
#  MongoDB  ->  PUT YOUR CONNECTION STRING HERE
# ---------------------------------------------------------------------
#  Local:  mongodb://localhost:27017/praja_disha
#  Atlas:  mongodb+srv://USER:PASS@cluster.mongodb.net/praja_disha?retryWrites=true&w=majority
#  The env var MONGODB_URI, if set, overrides this value.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/praja_disha}
spring.data.mongodb.auto-index-creation=true

# By default we talk to the real MongoDB above, so the bundled embedded
# MongoDB is switched off. (Run with the "dev" profile to turn it back on.)
spring.autoconfigure.exclude=de.flapdoodle.embed.mongo.spring.autoconfigure.EmbeddedMongoAutoConfiguration

# ---------------------------------------------------------------------
#  Web server
# ---------------------------------------------------------------------
server.port=8080
server.error.include-message=always

# ---------------------------------------------------------------------
#  App behaviour
# ---------------------------------------------------------------------
# Seed demo org / officers / departments / citizen / ticket on first boot
# (only when the database is empty). Set to false to disable.
app.seed-data=true

logging.level.org.springframework.data.mongodb.core.index=warn


#---
# =====================================================================
#  Profile: dev   ->   run with -Dspring-boot.run.profiles=dev
#  Uses an EMBEDDED MongoDB (auto-downloaded, no external DB needed).
#  Nothing to configure — just run it.
# =====================================================================
spring.config.activate.on-profile=dev

# Re-enable the embedded MongoDB auto-configuration (clears the exclusion above)
spring.autoconfigure.exclude=
# Embedded MongoDB version to download/run
de.flapdoodle.mongodb.embedded.version=7.0.4
