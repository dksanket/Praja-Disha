# =====================================================================
#  Praja Disha AI — Backend configuration
#  Edit the values below and run:  mvn spring-boot:run
# =====================================================================

spring.application.name=praja-disha-backend

# Import local .env file if present (treated as properties)
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

# ---------------------------------------------------------------------
#  MongoDB  ->  Connection string is loaded from .env (MONGODB_URI)
# ---------------------------------------------------------------------
#  Atlas: mongodb+srv://USER:PASS@cluster.mongodb.net/praja_disha?retryWrites=true&w=majority
#  The env var MONGODB_URI (set in .env) is used; fallback is local for safety.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/praja_disha}
spring.data.mongodb.auto-index-creation=true

# ---------------------------------------------------------------------
#  Web server
# ---------------------------------------------------------------------
server.port=8080
server.error.include-message=always

# ---------------------------------------------------------------------
#  Ollama Cloud (AI triage + copilot + embeddings)
# ---------------------------------------------------------------------
#  Get an API key at https://ollama.com. Set it via the OLLAMA_API_KEY env
#  var (preferred) OR paste it after the ':' below. Until a key is present,
#  the AI services transparently fall back to deterministic logic.
ollama.enabled=${OLLAMA_ENABLED:true}
ollama.base-url=${OLLAMA_BASE_URL:https://ollama.com}
ollama.api-key=${OLLAMA_API_KEY:}
ollama.chat-model=${OLLAMA_CHAT_MODEL:gpt-oss:120b}
ollama.embed-model=${OLLAMA_EMBED_MODEL:embeddinggemma}
ollama.timeout-seconds=${OLLAMA_TIMEOUT_SECONDS:60}

# ---------------------------------------------------------------------
#  Local file storage (photos / videos / voice recordings)
# ---------------------------------------------------------------------
#  Uploaded media is written under this directory on the server and served
#  back at http://<host>:8080/files/... . Set app.public-base-url to have the
#  upload endpoint return absolute URLs (e.g. https://api.praja-disha.gov.in).
app.upload-dir=${UPLOAD_DIR:./uploads}
app.public-base-url=${PUBLIC_BASE_URL:}
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:100MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:120MB}

# ---------------------------------------------------------------------
#  App behaviour
# ---------------------------------------------------------------------
# Seed demo org / officers / departments / citizen / ticket on first boot
# (only when the database is empty). Set to false to disable.
app.seed-data=false

logging.level.org.springframework.data.mongodb.core.index=warn

# ---------------------------------------------------------------------
#  JWT (Citizen App authentication)
# ---------------------------------------------------------------------
#  Secret must be at least 32 bytes. Override via env var JWT_SECRET in production.
app.jwt.secret=${JWT_SECRET:PrajaDishaSecretKey_ChangeThisInProduction_32Bytes}
# Token validity in days (default = 365 days ~ 1 year)
app.jwt.expiration-days=${JWT_EXPIRATION_DAYS:365}

# ---------------------------------------------------------------------
#  GCP Storage Configuration
# ---------------------------------------------------------------------
gcp.storage.bucket-name=${GCP_BUCKET_NAME:}
gcp.storage.project-id=${GCP_PROJECT_ID:}
gcp.storage.credentials-path=${GCP_CREDENTIALS_PATH:}

